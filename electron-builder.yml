appId: com.eliteflower.npdplanner
productName: NPD Planner
directories:
  buildResources: build
  output: dist-electron
files:
  - '!.chromium-bundle{,/**/*}'
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.*}'
  - '!{tailwind.config.js,postcss.config.js}'
# copy-chromium.js copies the local Playwright Chromium to .chromium-bundle/ before build
# so electron-builder can include it as extraResources (works on Windows and Mac)
extraResources:
  - from: ".chromium-bundle"
    to: playwright-browsers/chromium-1208
    filter:
      - "**/*"
  - from: resources/scripts/insert_photo.py
    to: scripts/insert_photo.py
  - from: "resources/templates/ELITE QUOTE BOUQUET 2026.xlsx"
    to: "templates/ELITE QUOTE BOUQUET 2026.xlsx"
asarUnpack:
  - resources/**
win:
  executableName: npd-planner
  target: nsis
  icon: resources/icon.ico
nsis:
  oneClick: true
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: false
  guid: A3F8C2D1-7E4B-4A90-B3C5-1D6E2F8A9B0C
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  createStartMenuShortcut: true
  deleteAppDataOnUninstall: false
mac:
  identity: null
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
  target: dmg
  icon: resources/icon.icns
  category: public.app-category.productivity
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: Carlosmsc491
  repo: npd-planner
  releaseType: release
