<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NPD Planner</title>
  <style>
    @font-face {
      font-family: 'Montserrat';
      font-weight: 600;
      font-style: italic;
      src: url('./fonts/Montserrat-SemiBoldItalic.ttf') format('truetype');
    }
    @font-face {
      font-family: 'Montserrat';
      font-weight: 100;
      font-style: italic;
      src: url('./fonts/Montserrat-ThinItalic.ttf') format('truetype');
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: drag;
      user-select: none;
    }
    body {
      transition: opacity 0.5s ease;
    }

    #splash-wrapper {
      position: relative;
      width: 480px;
      height: 480px;
    }

    #lottie-container {
      width: 480px;
      height: 480px;
    }

    #text-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      opacity: 0;
      animation: textFadeIn 0.43s ease forwards;
      animation-delay: 2.93s;
      pointer-events: none;
      white-space: nowrap;
    }

    @keyframes textFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    #text-title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-style: italic;
      font-size: 52px;
      color: #454073;
      letter-spacing: -0.5px;
      line-height: 1;
    }

    #text-subtitle {
      font-family: 'Montserrat', sans-serif;
      font-weight: 100;
      font-style: italic;
      font-size: 28px;
      color: #838383;
      letter-spacing: 3px;
      line-height: 1;
    }

    #video-fallback {
      display: none;
      width: 480px;
      height: 480px;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div id="splash-wrapper">
    <div id="lottie-container"></div>
    <div id="text-overlay">
      <span id="text-title">NPD Planner</span>
      <span id="text-subtitle">AN NPD APP</span>
    </div>
  </div>

  <video id="video-fallback" autoplay muted>
    <source src="./splash.webm" type="video/webm">
  </video>

  <script src="./lottie.min.js"></script>
  <script>
    try {
      const anim = lottie.loadAnimation({
        container: document.getElementById('lottie-container'),
        renderer: 'svg',
        loop: false,
        autoplay: true,
        path: './splash_notxt.json'
      });
      anim.addEventListener('error', showVideoFallback);
    } catch (e) {
      showVideoFallback();
    }

    function showVideoFallback() {
      document.getElementById('lottie-container').style.display = 'none';
      document.getElementById('text-overlay').style.display = 'none';
      const video = document.getElementById('video-fallback');
      video.style.display = 'block';
      video.play().catch(() => {});
    }
  </script>
</body>
</html>
